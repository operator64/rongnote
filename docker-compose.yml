# Local dev compose. Production compose snippet lives in deploy.md.
# Brings up Postgres + the app server on :8080.
# Frontend dev server (:5173) runs on the host via `cd web && npm run dev`
# and proxies /api to :8080.

services:
  notes-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: notes
      POSTGRES_PASSWORD: ${NOTES_DB_PW:-changeme}
      POSTGRES_DB: notes
    ports:
      # Host 5433 because the host already runs a local Postgres on 5432.
      # Inside the docker network, the in-container app still talks to :5432.
      - "5433:5432"
    volumes:
      - notes-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes -d notes"]
      interval: 5s
      timeout: 3s
      retries: 10

  notes:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      notes-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://notes:${NOTES_DB_PW:-changeme}@notes-db:5432/notes
      DATA_DIR: /data
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
      BIND_ADDR: 0.0.0.0:8080
      APP_ENV: ${APP_ENV:-development}
      SESSION_TTL: ${SESSION_TTL:-30d}
      RUST_LOG: ${RUST_LOG:-info,tower_http=debug,sqlx=warn}
    ports:
      - "8080:8080"
    volumes:
      - notes-data:/data

volumes:
  notes-db-data:
  notes-data:
