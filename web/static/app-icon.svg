<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Solid background; iOS will round the corners itself, Android masks
       it via maskable handling. We paint full-bleed so a maskable crop
       still leaves the glyph centred. -->
  <rect width="192" height="192" fill="#1f6feb"/>
  <text
    x="96"
    y="96"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
    font-weight="700"
    font-size="140"
    fill="#ffffff"
  >r</text>
  <circle cx="142" cy="142" r="11" fill="#ffffff"/>
</svg>
